<div class="container">

  <!-- HEADER -->
  <div class="header">

    <h1>Task Manager</h1>

    <div class="user-info">
      <span *ngIf="user$ | async as user">
        {{ user.displayName }}
      </span>

      <button class="logout-btn" (click)="logout()">
        Cerrar sesión
      </button>
    </div>

  </div>


  <!-- CONTENIDO -->
  <div class="main-layout">

    <!-- IZQUIERDA FORMULARIO -->
    <div class="left-panel">

      <h2>Crear / Editar Tarea</h2>

      <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="task-form">

        <input
          type="text"
          placeholder="Nombre de la tarea"
          formControlName="nombreTarea"
        />

        <textarea
          placeholder="Descripción"
          formControlName="descripcion"
        ></textarea>

        <label>Fecha registro</label>
        <input type="date" formControlName="fechaRegistro" />

        <label>Fecha límite</label>
        <input type="date" formControlName="fechaLimite" />

        <button type="submit">
          {{ editingId ? 'Actualizar' : 'Agregar Tarea' }}
        </button>

      </form>

    </div>


    <!-- DERECHA LISTA -->
    <div class="right-panel">

      <h2>Mis Tareas</h2>

      <div class="filters">

        <button (click)="filterTasks('all')">Todas</button>
        <button (click)="filterTasks('completed')">Completadas</button>
        <button (click)="filterTasks('pending')">Pendientes</button>

      </div>

      <div class="tasks">

        <div *ngFor="let task of tasks" class="task-card">

          <h3 [class.completed]="task.completada">
            {{ task.nombreTarea }}
          </h3>

          <p>{{ task.descripcion }}</p>

          <p>
            Registro:
            {{ task.fechaRegistro | date:'shortDate' }}
          </p>

          <p>
            Límite:
            {{ task.fechaLimite | date:'shortDate' }}
          </p>

          <div class="actions">

            <button (click)="toggleComplete(task)">
              {{ task.completada ? 'Desmarcar' : 'Completar' }}
            </button>

            <button (click)="editTask(task)">
              Editar
            </button>

            <button (click)="deleteTask(task.id)">
              Eliminar
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
